<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0c10; color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center; padding: 20px; overflow-x: hidden;
            min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
        }
        #spyScreen { display: none; flex-direction: column; align-items: center; justify-content: center; margin-top: 100px; }
        #spyScreen h1 { color: #ff0055; font-size: 32px; margin-bottom: 15px; text-shadow: 0 0 15px #ff0055; }
        
        #mainApp { display: none; width: 100%; flex-direction: column; align-items: center; }
        #inviteScreen { display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 30px; }
        h2 { color: #00ffcc; margin-bottom: 8px; font-size: 24px; text-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }
        .subtitle-desc { color: #aaafb8; font-size: 14px; margin: 0 15px 20px 15px; max-width: 340px; line-height: 1.4; }
        
        .gif-container img { width: 140px; height: 140px; border-radius: 15px; object-fit: cover; box-shadow: 0 0 15px rgba(0, 0, 0, 0.5); margin-bottom: 20px; }
        .btn-group { position: relative; width: 100%; max-width: 340px; height: 240px; margin-top: 10px; border: 2px dashed rgba(0, 255, 204, 0.12); border-radius: 20px; }
        .btn-main { padding: 14px 32px; font-size: 17px; font-weight: bold; border: none; border-radius: 25px; cursor: pointer; position: absolute; user-select: none; }
        #yesBtn { background: #00ffcc; color: #0b0c10; left: 25px; top: 25px; box-shadow: 0 0 20px #00ffcc; }
        #noBtn { background: #ff0055; color: #ffffff; right: 25px; top: 25px; box-shadow: 0 0 20px #ff0055; z-index: 9999; width: 110px; height: 48px; text-align: center; line-height: 48px; transition: all 0.15s ease-out; }
        
        #hallScreen { display: none; width: 100%; max-width: 450px; }
        .selector-title { font-size: 14px; color: #00ffcc; text-align: left; width: 100%; max-width: 360px; margin: 15px auto 6px auto; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .scroll-container { display: flex; gap: 12px; overflow-x: auto; width: 100%; max-width: 360px; margin: 0 auto 15px auto; padding: 6px 4px; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        .date-badge, .time-badge { padding: 11px 20px; background: #1f2833; border: 2px solid #45f3ff; border-radius: 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .date-badge.active, .time-badge.active { background: #00ffcc; color: #0b0c10; font-weight: bold; box-shadow: 0 0 15px #00ffcc; border-color: #00ffcc; }
        
        .room-indicator { color: #ea00d9; font-weight: bold; font-size: 14px; margin: 5px auto 15px auto; text-transform: uppercase; background: rgba(234, 0, 217, 0.1); padding: 6px 14px; border-radius: 20px; display: inline-block; }
        .legend-container { display: flex; justify-content: center; gap: 16px; margin: 10px auto; font-size: 11px; color: #aaafb8; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-box { width: 14px; height: 14px; border-radius: 3px; }
        .l-single { border: 2px solid #45f3ff; background: #1f2833; }
        .l-sofa { border: 2px solid #00ffcc; background: rgba(0, 255, 204, 0.1); }
        .l-busy { background: #2b2b2b; border: 2px solid #444; }
        .screen-line { width: 90%; height: 6px; background: #00ffcc; margin: 15px auto 5px auto; border-radius: 50%; box-shadow: 0px 0px 15px 4px rgba(0, 255, 204, 0.7); }
        .screen-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        
        .hall-container { display: flex; flex-direction: column; gap: 16px; width: 100%; margin-bottom: 30px; }
        .row-line { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .row-number { font-size: 12px; color: #555; width: 20px; font-weight: bold; }
        .seat { padding: 12px 6px; background: #1f2833; border: 2px solid #45f3ff; border-radius: 8px; font-size: 11px; cursor: pointer; min-width: 44px; text-align: center; }
        .sofa-pair { display: flex; flex-direction: column; align-items: center; gap: 2px; border: 2px solid #00ffcc; border-radius: 10px; padding: 4px; background: rgba(0, 255, 204, 0.04); }
        .sofa-seats { display: flex; gap: 4px; }
        .sofa-pair .seat { border: none; background: #1a232c; }
        .sofa-label { font-size: 7px; color: #00ffcc; text-transform: uppercase; font-weight: bold; }
        .seat.busy { background: #2b2b2b !important; color: #666; border-color: #444; cursor: not-allowed; }
        .seat.selected { background: #ea00d9 !important; color: #fff; box-shadow: 0 0 12px #ea00d9; }
        .btn-confirm { background: #00ffcc; color: #0b0c10; border: none; padding: 16px 40px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0px 0px 15px rgba(0, 255, 204, 0.4); display: none; margin: 20px auto; width: 90%; max-width: 280px; }
    </style>
</head>
<body>

    <div id="spyScreen">
        <div class="gif-container"><img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z5bW93OTZpY2VwY3A5MXV0eXNndmZ3N3R5bW94ZXg4dW94ZXB6YSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/8vQSQ3cNXuDGo/giphy.gif"></div>
        <h1>А вы кто? 🤔</h1>
        <p>Доступ закрыт.</p>
    </div>

    <div id="mainApp">
        <div id="inviteScreen">
            <div class="gif-container">
                <img id="inviteGif" src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExbW9sc3N6cXFvZm10M3NndmZ3d3R0ZndwOHI0bW94ZXg4dW94ZXB6YSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/c7stMc7OclpPy29e9Z/giphy.gif">
            </div>
            <h2>Пойдёшь со мной в кино? 🕷️❤️</h2>
            <p class="subtitle-desc">mooon в Dana Mall. VIP-зал с диванами.</p>
            <div class="btn-group" id="boxTrap">
                <button class="btn-main" id="yesBtn">Да! 🥰</button>
                <button class="btn-main" id="noBtn" onclick="preventClick(event)">Нет 😢</button>
            </div>
        </div>

        <div id="hallScreen">
            <div class="selector-title">1. Выбери дату сеанса:</div>
            <div class="scroll-container" id="dateContainer"></div>
            <div class="selector-title">2. Доступное время:</div>
            <div class="scroll-container" id="timeContainer"></div>
            <div id="roomIndicator" class="room-indicator">Загрузка сеансов...</div>
            <div class="legend-container">
                <div class="legend-item"><div class="legend-box l-single"></div> Кресло</div>
                <div class="legend-item"><div class="legend-box l-sofa"></div> VIP Диван</div>
                <div class="legend-item"><div class="legend-box l-busy"></div> Занято</div>
            </div>
            <div class="screen-line"></div>
            <div class="screen-label">ЭКРАН СЕАНСА</div>
            <div class="hall-container" id="dynamicHall"></div>
            <button class="btn-confirm" id="confirmButton" onclick="sendSeatsToServer()">Подтвердить места 🎬</button>
        </div>
    </div>

    <script>
        // === СЮДА ВСТАВИШЬ ССЫЛКУ ИЗ LOCALTUNNEL НА ШАГЕ 3 ===
        const API_BASE_URL = 'https://СЮДА_ВСТАВИТЬ_ССЫЛКУ'; 
        // ====================================================

        const tg = window.Telegram ? window.Telegram.WebApp : null;
        let tgUsername = null;
        let tgId = null;
        let noButtonClicks = 0;

        if (tg) {
            tg.expand();
            tg.ready();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                tgUsername = tg.initDataUnsafe.user.username;
                tgId = tg.initDataUnsafe.user.id ? tg.initDataUnsafe.user.id.toString() : null;
            }
        }

        window.onload = function() {
            const checkUser = tgUsername || "";
            const checkId = tgId || "";

            fetch(`${API_BASE_URL}/api/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: checkUser, tg_id: checkId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.access === 'granted') {
                    document.getElementById('mainApp').style.display = 'flex';
                } else {
                    document.getElementById('spyScreen').style.display = 'flex';
                }
            })
            .catch(() => {
                document.getElementById('mainApp').style.display = 'flex';
            });
        };

        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const inviteScreen = document.getElementById('inviteScreen');
        const hallScreen = document.getElementById('hallScreen');
        const inviteGif = document.getElementById('inviteGif');
        const boxTrap = document.getElementById('boxTrap');
        const confirmBtn = document.getElementById('confirmButton');
        const roomIndicator = document.getElementById('roomIndicator');

        function preventClick(e) { e.preventDefault(); e.stopPropagation(); return false; }

        function moveNoButton(e) {
            if (e.type === 'touchstart') e.preventDefault();
            noButtonClicks++;
            
            fetch(`${API_BASE_URL}/api/track-no`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: tgUsername, no_clicks: noButtonClicks })
            });

            inviteGif.src = "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z5bW93OTZpY2VwY3A5MXV0eXNndmZ3N3R5bW94ZXg4dW94ZXB6YSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/7SF5scGB2AFr1XPumq/giphy.gif";
            const maxWidth = boxTrap.clientWidth - noBtn.offsetWidth - 15;
            const maxHeight = boxTrap.clientHeight - noBtn.offsetHeight - 15;
            noBtn.style.left = Math.max(10, Math.floor(Math.random() * maxWidth)) + 'px';
            noBtn.style.top = Math.max(10, Math.floor(Math.random() * maxHeight)) + 'px';
        }

        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton, { passive: false });

        let serverData = {};
        let selectedDate = "";
        let selectedSession = null;
        let selectedSeatsArray = [];

        yesBtn.onclick = function() {
            inviteScreen.style.display = 'none';
            hallScreen.style.display = 'block';
            
            fetch(`${API_BASE_URL}/api/schedule`)
                .then(res => res.json())
                .then(data => {
                    serverData = data;
                    renderDates();
                });
        };

        function renderDates() {
            const dateContainer = document.getElementById('dateContainer');
            dateContainer.innerHTML = "";
            const dates = Object.keys(serverData);
            dates.forEach((dateStr, idx) => {
                const badge = document.createElement('div');
                badge.className = 'date-badge' + (idx === 0 ? ' active' : '');
                badge.innerText = dateStr;
                badge.onclick = () => {
                    document.querySelectorAll('.date-badge').forEach(b => b.classList.remove('active'));
                    badge.classList.add('active');
                    selectedDate = dateStr;
                    renderTimes(dateStr);
                };
                dateContainer.appendChild(badge);
            });
            if(dates.length > 0) { selectedDate = dates[0]; renderTimes(dates[0]); }
        }

        function renderTimes(dateStr) {
            const timeContainer = document.getElementById('timeContainer');
            timeContainer.innerHTML = "";
            const sessions = serverData[dateStr] || [];
            sessions.forEach((session, idx) => {
                const badge = document.createElement('div');
                badge.className = 'time-badge' + (idx === 0 ? ' active' : '');
                badge.innerText = session.time;
                badge.onclick = () => {
                    document.querySelectorAll('.time-badge').forEach(b => b.classList.remove('active'));
                    badge.classList.add('active');
                    selectedSession = session;
                    updateHallUI();
                };
                timeContainer.appendChild(badge);
            });
            if(sessions.length > 0) { selectedSession = sessions[0]; updateHallUI(); }
        }

        function updateHallUI() {
            const container = document.getElementById('dynamicHall');
            container.innerHTML = '';
            selectedSeatsArray = [];
            confirmBtn.style.display = 'none';
            if (!selectedSession) return;
            roomIndicator.innerText = selectedSession.hall;

            const rowsMap = {};
            selectedSession.seats.forEach(item => {
                if (!rowsMap[item.row]) rowsMap[item.row] = [];
                rowsMap[item.row].push(item);
            });

            Object.keys(rowsMap).sort((a, b) => a - b).forEach(rowNum => {
                const rowLine = document.createElement('div');
                rowLine.className = 'row-line';
                const rowLabel = document.createElement('div');
                rowLabel.className = 'row-number';
                rowLabel.innerText = `Р${rowNum}`;
                rowLine.appendChild(rowLabel);

                rowsMap[rowNum].forEach(item => {
                    if (item.type === 'single') {
                        rowLine.appendChild(createSeatElement(rowNum, item.seat, item.free, false));
                    } else if (item.type === 'sofa') {
                        const sofaWrapper = document.createElement('div');
                        sofaWrapper.className = 'sofa-pair';
                        const sofaSeats = document.createElement('div');
                        sofaSeats.className = 'sofa-seats';
                        const left = item.seat.split('-')[0];
                        const right = item.seat.split('-')[1];
                        sofaSeats.appendChild(createSeatElement(rowNum, left, item.free1, true));
                        sofaSeats.appendChild(createSeatElement(rowNum, right, item.free2, true));
                        const label = document.createElement('div');
                        label.className = 'sofa-label';
                        label.innerText = 'диван';
                        sofaWrapper.appendChild(sofaSeats);
                        sofaWrapper.appendChild(label);
                        rowLine.appendChild(sofaWrapper);
                    }
                });
                container.appendChild(rowLine);
            });
        }

        function createSeatElement(rowNum, seatNum, isFree, isSofa) {
            const seatBlock = document.createElement('div');
            seatBlock.className = 'seat' + (isFree ? '' : ' busy');
            seatBlock.innerText = seatNum;
            if (isFree) {
                seatBlock.onclick = function() {
                    const seatIdentifier = `Ряд ${rowNum} Место ${seatNum} (${isSofa ? 'Диван' : 'Кресло'})`;
                    if (seatBlock.classList.contains('selected')) {
                        seatBlock.classList.remove('selected');
                        selectedSeatsArray = selectedSeatsArray.filter(x => x !== seatIdentifier);
                    } else {
                        seatBlock.classList.add('selected');
                        selectedSeatsArray.push(seatIdentifier);
                    }
                    confirmBtn.style.display = selectedSeatsArray.length > 0 ? 'block' : 'none';
                };
            }
            return seatBlock;
        }

        function sendSeatsToServer() {
            if (selectedSeatsArray.length === 0) return;
            confirmBtn.disabled = true;
            confirmBtn.innerText = "Отправка...";

            fetch(`${API_BASE_URL}/api/book`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    date: selectedDate,
                    time: selectedSession.time,
                    hall: selectedSession.hall,
                    seats: selectedSeatsArray,
                    username: tgUsername,
                    no_clicks: noButtonClicks
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    if (tg) {
                        tg.showAlert("Места подтверждены! До встречи в кино, любимая! ❤️🎬");
                        setTimeout(() => tg.close(), 1200);
                    } else {
                        alert("Успешно!");
                        location.reload();
                    }
                }
            });
        }
    </script>
</body>
</html>
</html>
