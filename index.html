<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кинопространство MOON — Зал 7 VIP</title>
    <script src="https://telegram.org"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        /* ЭКРАН 1: ПРИГЛАШЕНИЕ И ЛОВУШКА */
        #inviteScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 30px;
            animation: fadeIn 0.5s ease-in-out;
        }

        h2 {
            color: #00ffcc;
            margin-bottom: 8px;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .subtitle-desc {
            color: #aaafb8;
            font-size: 14px;
            margin: 0 15px 20px 15px;
            max-width: 340px;
            line-height: 1.4;
        }

        .gif-container {
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 140px;
            height: 140px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
        
        .btn-group { 
            position: relative; 
            width: 100%; 
            max-width: 340px; 
            height: 240px; 
            margin-top: 10px;
            border: 2px dashed rgba(0, 255, 204, 0.12);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.01);
        }
        
        .btn-main {
            padding: 14px 32px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            position: absolute;
            user-select: none;
        }

        #yesBtn {
            background: #00ffcc;
            color: #0b0c10;
            left: 25px;
            top: 25px;
            box-shadow: 0 0 20px #00ffcc;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            z-index: 10;
        }

        #yesBtn:active {
            transform: scale(0.95);
        }
        
        #noBtn { 
            background: #ea00d9; 
            color: #ffffff; 
            right: 25px; 
            top: 25px; 
            box-shadow: 0 0 20px #ea00d9; 
            z-index: 9999; 
            width: 110px;
            height: 48px;
            padding: 0;
            line-height: 48px;
            text-align: center;
            transition: left 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* ЭКРАН 2: СХЕМА ЗАЛА И СЕАНСЫ */
        #hallScreen {
            display: none;
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.4s ease-in-out;
        }

        .selector-title {
            font-size: 14px;
            color: #00ffcc;
            text-align: left;
            width: 100%;
            max-width: 360px;
            margin: 15px auto 6px auto;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .scroll-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            width: 100%;
            max-width: 360px;
            margin: 0 auto 15px auto;
            padding: 6px 4px;
            scrollbar-width: none;
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
        }
        
        .date-badge, .time-badge {
            padding: 11px 20px;
            background: #1f2833;
            border: 2px solid #45f3ff;
            border-radius: 14px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .date-badge.active, .time-badge.active {
            background: #00ffcc;
            color: #0b0c10;
            font-weight: bold;
            box-shadow: 0 0 15px #00ffcc;
            border-color: #00ffcc;
            transform: translateY(-2px);
        }

        .screen-line {
            width: 90%;
            height: 6px;
            background: #00ffcc;
            margin: 25px auto 10px auto;
            border-radius: 50%;
            box-shadow: 0px 0px 15px 4px rgba(0, 255, 204, 0.7);
        }

        .screen-label {
            font-size: 11px;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        .hall-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            margin: 0 auto 30px auto;
        }

        .row-line {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }
        .row-number {
            font-size: 13px;
            color: #555555;
            width: 20px;
            text-align: right;
            font-weight: bold;
        }
        
        .sofa-pair {
            display: flex;
            gap: 3px;
            border: 2px solid #00ffcc;
            border-radius: 14px;
            padding: 3px;
            background: rgba(0, 255, 204, 0.03);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.1);
            transition: border-color 0.2s ease;
        }

        .seat {
            padding: 12px 10px;
            background: #1f2833;
            border: 2px solid #45f3ff;
            border-radius: 10px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            min-width: 50px;
            text-align: center;
            font-weight: 500;
        }

        .sofa-pair .seat {
            border: none;
            border-radius: 8px;
        }
        
        .seat.busy {
            background: #2b2b2b;
            color: #666666;
            border-color: #444444;
            cursor: not-allowed;
        }

        .sofa-pair .seat.busy {
            background: #222222;
        }
        .seat.selected {
            background: #ea00d9;
            color: #ffffff;
            font-weight: bold;
            box-shadow: 0 0 12px #ea00d9;
        }

        .btn-confirm {
            background: #00ffcc;
            color: #0b0c10;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0px 0px 15px rgba(0, 255, 204, 0.4);
            display: none;
            margin: 20px auto;
            width: 90%;
            max-width: 280px;
            transition: all 0.2s ease;
        }

        .btn-confirm:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ЛОВУШКА -->
    <div id="inviteScreen">
        <div class="gif-container">
            <img id="inviteGif" src="https://mir-animashki.ru" alt="cute">
        </div>
        <h2>Пойдёшь со мной в кино? 🕷️❤️</h2>
        <p class="subtitle-desc">В конец июля, на нового Человека-Паука в VIP-зал 7 в mooon (Dana Mall)</p>
        
        <div class="btn-group" id="boxTrap">
            <button class="btn-main" id="yesBtn">Да! 🥰</button>
            <button class="btn-main" id="noBtn">Нет 😢</button>
        </div>
    </div>

    <!-- ЭКРАН 2: ВЫБОР -->
    <div id="hallScreen">
        <div class="selector-title">Выбери дату:</div>
        <div class="scroll-container" id="dateContainer"></div>

        <div class="selector-title">Выбери время:</div>
        <div class="scroll-container" id="timeContainer"></div>

        <div class="screen-line"></div>
        <div class="screen-label">ЭКРАН Зала 7 VIP</div>

        <div class="hall-container" id="dynamicHall"></div>
        <button class="btn-confirm" id="confirmButton" onclick="sendSeatsToBot()">Подтвердить сеанс и места 🎬</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const inviteScreen = document.getElementById('inviteScreen');
        const hallScreen = document.getElementById('hallScreen');
        const inviteGif = document.getElementById('inviteGif');
        const boxTrap = document.getElementById('boxTrap');

        function moveNoButton() {
            inviteGif.src = "https://оченьгрустно.рф/wp-content/uploads/2023/10/photo_5431697223631623868_y.jpg";
            
            const maxWidth = boxTrap.clientWidth - noBtn.offsetWidth - 15;
            const maxHeight = boxTrap.clientHeight - noBtn.offsetHeight - 15;
            
            const randomX = Math.max(10, Math.floor(Math.random() * maxWidth));
            const randomY = Math.max(10, Math.floor(Math.random() * maxHeight));
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton);

        yesBtn.onclick = function(e) {
            e.preventDefault();
            inviteScreen.style.display = 'none';
            hallScreen.style.display = 'block';
            initSchedule(); 
        };

        let scheduleData = {};
        let selectedDate = "";
        let selectedTime = "";
        let selectedSeatsArray = [];
        
        const dateContainer = document.getElementById('dateContainer');
        const timeContainer = document.getElementById('timeContainer');
        const container = document.getElementById('dynamicHall');
        const confirmBtn = document.getElementById('confirmButton');

        function initSchedule() {
            let rawData = tg && tg.initDataUnsafe ? tg.initDataUnsafe.start_param : "";
            if (rawData) {
                try {
                    scheduleData = JSON.parse(decodeURIComponent(rawData));
                } catch(e) {
                    console.error("Ошибка десериализации дерева сеансов:", e);
                }
            }

            if (Object.keys(scheduleData).length === 0) {
                scheduleData = {
                    "Июль, 28": {
                        "15:40": [{row:1, seat:1, free:true},{row:1, seat:2, free:true},{row:1, seat:3, free:false},{row:1, seat:4, free:false}],
                        "18:20": [{row:1, seat:1, free:true},{row:1, seat:2, free:true}]
                    },
                    "Июль, 29": {
                        "16:00": [{row:1, seat:1, free:true},{row:1, seat:2, free:true}],
                        "20:30": [{row:1, seat:1, free:false},{row:1, seat:2, free:false}]
                    }
                };
            }

            renderDates();
        }

        function renderDates() {
            dateContainer.innerHTML = "";
            Object.keys(scheduleData).forEach((dateStr, idx) => {
                const badge = document.createElement('div');
                badge.className = 'date-badge' + (idx === 0 ? ' active' : '');
                badge.innerText = dateStr;
                badge.onclick = () => {
                    document.querySelectorAll('.date-badge').forEach(b => b.classList.remove('active'));
                    badge.classList.add('active');
                    selectedDate = dateStr;
                    renderTimes(dateStr);
                };
                dateContainer.appendChild(badge);
                if(idx === 0) {
                    selectedDate = dateStr;
                    renderTimes(dateStr);
                }
            });
        }

        function renderTimes(dateStr) {
            timeContainer.innerHTML = "";
            const times = scheduleData[dateStr] ? Object.keys(scheduleData[dateStr]) : [];
            times.forEach((timeStr, idx) => {
                const badge = document.createElement('div');
                badge.className = 'time-badge' + (idx === 0 ? ' active' : '');
                badge.innerText = timeStr;
                badge.onclick = () => {
                    document.querySelectorAll('.time-badge').forEach(b => b.classList.remove('active'));
                    badge.classList.add('active');
                    selectedTime = timeStr;
                    renderHall(scheduleData[selectedDate][timeStr]);
                };
                timeContainer.appendChild(badge);
                if(idx === 0) {
                    selectedTime = timeStr;
                    renderHall(scheduleData[selectedDate][timeStr]);
                }
            });
        }

        function renderHall(seatsList) {
            container.innerHTML = '';
            selectedSeatsArray = [];
            confirmBtn.style.display = 'none';

            const rowsMap = {};
            seatsList.forEach(item => {
                if (!rowsMap[item.row]) rowsMap[item.row] = [];
                rowsMap[item.row].push(item);
            });

            Object.keys(rowsMap).sort((a, b) => a - b).forEach(rowNum => {
                const rowLine = document.createElement('div');
                rowLine.className = 'row-line';

                const rowLabel = document.createElement('div');
                rowLabel.className = 'row-number';
                rowLabel.innerText = rowNum;
                rowLine.appendChild(rowLabel);

                const sortedSeats = rowsMap[rowNum].sort((a, b) => a.seat - b.seat);
                
                for (let i = 0; i < sortedSeats.length; i++) {
                    const current = sortedSeats[i];
                    const next = sortedSeats[i + 1];

                    if (next && current.seat % 2 === 1 && next.seat === current.seat + 1) {
                        const sofa = document.createElement('div');
                        sofa.className = 'sofa-pair';

                        [current, next].forEach(item => {
                            sofa.appendChild(createSeatBlock(item));
                        });

                        rowLine.appendChild(sofa);
                        i++;
                    } else {
                        rowLine.appendChild(createSeatBlock(current));
                    }
                }
                container.appendChild(rowLine);
            });
        }

        function createSeatBlock(item) {
            const block = document.createElement('div');
            block.className = 'seat' + (item.free ? '' : ' busy');
            block.innerText = `М${item.seat}`;
            
            if (item.free) {
                block.onclick = function() {
                    const seatName = `Р${item.row}М${item.seat}`;
                    
                    if (block.classList.contains('selected')) {
                        block.classList.remove('selected');
                        selectedSeatsArray = selectedSeatsArray.filter(x => x !== seatName);
                    } else {
                        block.classList.add('selected');
                        selectedSeatsArray.push(seatName);
                    }
                    confirmBtn.style.display = selectedSeatsArray.length > 0 ? 'block' : 'none';
                };
            }
            return block;
        }

        function sendSeatsToBot() {
            if (selectedSeatsArray.length > 0 && tg) {
                const result = `Дата: ${selectedDate} | Время: ${selectedTime} | Места: ${selectedSeatsArray.join(', ')}`;
                tg.sendData(result);
                tg.close();
            }
        }
    </script>
</body>
</html>
