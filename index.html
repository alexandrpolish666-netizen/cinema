<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кинотеатр MOON</title>
    <script src="https://telegram.org"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #inviteScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        h2 { color: #00ffcc; margin-bottom: 10px; font-size: 24px; }
        .gif-container img { width: 140px; height: 140px; margin-bottom: 20px; border-radius: 10px; object-fit: cover; }
        
        .btn-group { 
            position: relative; 
            width: 100%; 
            max-width: 320px; 
            height: 120px; 
            margin-top: 20px; 
        }
        
        .btn-main {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            position: absolute;
        }
        /* Фиксируем начальное положение кнопок в пикселях, чтобы они не ломались внутри ТГ */
        #yesBtn { background: #00ffcc; color: #0b0c10; left: 10px; top: 30px; box-shadow: 0 0 15px #00ffcc; }
        #noBtn { background: #ea00d9; color: #fff; right: 10px; top: 30px; box-shadow: 0 0 15px #ea00d9; z-index: 9999; }

        #hallScreen {
            display: none;
            width: 100%;
        }
        .screen-line {
            width: 85%;
            height: 6px;
            background: #00ffcc;
            margin: 20px auto;
            border-radius: 50%;
            box-shadow: 0px 0px 15px 4px rgba(0, 255, 204, 0.6);
        }
        .screen-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        .hall-container { display: flex; flex-direction: column; gap: 12px; max-width: 500px; margin: 0 auto 30px auto; }
        .row-line { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .row-number { font-size: 11px; color: #555; width: 20px; text-align: right; }
        
        .seat {
            padding: 10px 12px; background: #1f2833; border: 2px solid #45f3ff; border-radius: 8px;
            font-size: 11px; cursor: pointer; transition: all 0.2s ease; user-select: none; min-width: 35px;
        }
        .seat.busy { background: #2b2b2b; border-color: #444; color: #666; cursor: not-allowed; }
        .seat.selected { background: #ea00d9; border-color: #ea00d9; color: #fff; font-weight: bold; box-shadow: 0 0 12px #ea00d9; }
        
        #confirmButton {
            background: #00ffcc; color: #0b0c10; border: none; padding: 15px 35px; font-size: 16px;
            font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0px 0px 15px rgba(0, 255, 204, 0.4);
            display: none; margin: 20px auto; width: 85%; max-width: 280px;
        }
    </style>
</head>
<body>

    <div id="inviteScreen">
        <div class="gif-container">
            <!-- Заменили капризный сервис giphy на стабильный прямой хостинг картинок ТГ -->
            <img id="inviteGif" src="https://mir-animashki.ru" alt="cute">
        </div>
        <h2>Пойдёшь со мной в кино? 🕷️❤️</h2>
        <p style="color: #aaafb8; font-size: 14px; margin: 0 20px;">В конце июля, на нового Человека-Паука в VIP-зал MOON в Dana Mall!</p>
        
        <div class="btn-group">
            <button class="btn-main" id="yesBtn">Да! 🥰</button>
            <button class="btn-main" id="noBtn">Нет 😢</button>
        </div>
    </div>

    <div id="hallScreen">
        <h3>🍿 Выбери нам места:</h3>
        <div class="screen-line"></div>
        <div class="screen-label">ЭКРАН Кинотеатра</div>

        <div class="hall-container" id="dynamicHall"></div>
        <button id="confirmButton" onclick="sendSeatsToBot()">Подтвердить выбор мест 🎬</button>
    </div>

    <script>
        // Инициализация Telegram Web App API
        let tg;
        try {
            tg = window.Telegram.WebApp;
            tg.expand();
        } catch (e) {
            console.log("Запущено вне Telegram");
        }

        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const inviteScreen = document.getElementById('inviteScreen');
        const hallScreen = document.getElementById('hallScreen');
        const inviteGif = document.getElementById('inviteGif');

        // 🔥 ПОЛНОЕ ИСПРАВЛЕНИЕ ДЛЯ КОМПЬЮТЕРНЫХ МЫШЕК
        function moveNoButton() {
            // Если пытаемся нажать "Нет" — меняем картинку на плачущую
            inviteGif.src = "https://оченьгрустно.рф/wp-content/uploads/2023/10/photo_5431697223631623868_y.jpg";
            
            // Вычисляем размеры экрана, оставляя безопасные отступы по 50px от краев фрейма
            const maxWidth = window.innerWidth - noBtn.offsetWidth - 50;
            const maxHeight = window.innerHeight - noBtn.offsetHeight - 50;
            
            const randomX = Math.max(30, Math.floor(Math.random() * maxWidth));
            const randomY = Math.max(30, Math.floor(Math.random() * maxHeight));
            
            // Жестко привязываем кнопку через fixed, чтобы фрейм Telegram не блокировал клик
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // На ПК вешаем триггер на малейшее движение мыши рядом
        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('click', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton);

        // Переход на экран выбора мест
        yesBtn.addEventListener('click', function() {
            inviteScreen.style.display = 'none';
            hallScreen.style.display = 'block';
            renderHall(); 
        });

        let selectedArray = [];
        const container = document.getElementById('dynamicHall');
        const confirmBtn = document.getElementById('confirmButton');

        function renderHall() {
            container.innerHTML = '';
            let rawData = "";
            
            if (tg && tg.initDataUnsafe) {
                rawData = tg.initDataUnsafe.start_param;
            }
            
            let parsedSeats = [];

            if (rawData) {
                try {
                    parsedSeats = JSON.parse(decodeURIComponent(rawData));
                } catch(e) {
                    console.error("Ошибка парсинга", e);
                }
            }

            if (parsedSeats.length === 0) {
                parsedSeats = [
                    { row: 1, seat: 1, free: true }, { row: 1, seat: 2, free: true }, { row: 1, seat: 3, free: true }, { row: 1, seat: 4, free: true },
                    { row: 2, seat: 1, free: true }, { row: 2, seat: 2, free: false }, { row: 2, seat: 3, free: false }, { row: 2, seat: 4, free: true },
                    { row: 3, seat: 1, free: true }, { row: 3, seat: 2, free: true }, { row: 3, seat: 3, free: true }, { row: 3, seat: 4, free: true }
                ];
            }

            const rowsMap = {};
            parsedSeats.forEach(item => {
                if (!rowsMap[item.row]) rowsMap[item.row] = [];
                rowsMap[item.row].push(item);
            });

            Object.keys(rowsMap).sort((a, b) => a - b).forEach(rowNum => {
                const rowLine = document.createElement('div');
                rowLine.className = 'row-line';

                const rowLabel = document.createElement('div');
                rowLabel.className = 'row-number';
                rowLabel.innerText = rowNum;
                rowLine.appendChild(rowLabel);

                rowsMap[rowNum].sort((a, b) => a.seat - b.seat).forEach(item => {
                    const block = document.createElement('div');
                    block.className = 'seat' + (item.free ? '' : ' busy');
                    block.innerText = `М${item.seat}`;
                    
                    if (item.free) {
                        block.onclick = () => {
                            const name = `Ряд ${item.row} Место ${item.seat}`;
                            
                            if (block.classList.contains('selected')) {
                                block.classList.remove('selected');
                                selectedArray = selectedArray.filter(x => x !== name);
                            } else {
                                block.classList.add('selected');
                                selectedArray.push(name);
                            }
                            confirmBtn.style.display = selectedArray.length > 0 ? 'block' : 'none';
                        };
                    }
                    rowLine.appendChild(block);
                });
                container.appendChild(rowLine);
            });
        }

        function sendSeatsToBot() {
            if (selectedArray.length > 0 && tg) {
                const resultString = selectedArray.join(', ');
                tg.sendData(resultString); 
                tg.close();
            }
        }
    </script>
</body>
</html>
